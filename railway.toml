# Railway config for the nightly pipeline. Lives at the repo root so Railway
# reads it with Root Directory = repo root (the pipeline runs scripts/ and reads
# data/, so it needs the whole repo, not just automation/).
#
# The cron SCHEDULE is set in the Railway dashboard (Settings -> Cron Schedule),
# not here — that's Railway's reliable method. Use:  0 7 * * *   (daily 07:00 UTC)
#
# A cron service must run its command and EXIT — the pipeline does. restartPolicy
# "never" stops a failed run from looping; it just retries on the next schedule.

[build]
builder = "nixpacks"

[deploy]
startCommand = "python3 automation/pipeline.py"
restartPolicyType = "never"
